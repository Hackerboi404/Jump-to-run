<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise For Annu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Monoton&family=Pacifico&display=swap');

        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; text-align: center; width: 100%; }

        /* Start Button */
        .start-btn {
            padding: 20px 50px; font-size: 1.8rem; background: transparent;
            color: #ff00de; border: 4px solid #ff00de; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px #ff00de; font-family: 'Monoton', cursive;
            transition: 0.3s;
        }

        /* Neon Glowing Text */
        .neon-msg {
            display: none;
            font-family: 'Monoton', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de, 0 0 40px #ff00de, 0 0 80px #ff00de;
            animation: pulse 1s infinite alternate;
            line-height: 1.2;
        }

        /* Neon Hug Stage */
        .stage {
            display: none;
            position: relative;
            height: 400px;
            width: 100%;
        }

        .neon-char {
            position: absolute;
            bottom: 50px;
            width: 120px;
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #boy { left: -150px; stroke: #00f2ff; filter: drop-shadow(0 0 20px #00f2ff); }
        #girl { right: -150px; stroke: #ff00de; filter: drop-shadow(0 0 20px #ff00de); }

        /* Hug Animation Movement */
        .walk-in #boy { left: calc(50% - 85px); }
        .walk-in #girl { right: calc(50% - 85px); z-index: 11; }

        /* Tamatar Style Message at the end */
        .tamatar-text {
            color: #ff4d4d;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            font-size: 2.5rem;
            margin-top: 20px;
        }

        @keyframes pulse { from { opacity: 0.8; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

        #tamatar-zone {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20;
        }

        .tomato-rain {
            position: absolute; font-size: 40px; animation: fall 3s linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/Kiss-Me-Close-Your-Eyes.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="start-screen">
            <button class="start-btn" onclick="runStory()">SURPRISE START ❤️</button>
        </div>

        <div id="message-screen" class="neon-msg">
            I LOVE YOU ANNU ❤️ <br>
            <span style="font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff;">Half Gf Hai Tu Meri! ✨</span>
        </div>

        <div id="dance-stage" class="stage">
            <svg id="boy" class="neon-char" viewBox="0 0 100 200">
                <circle cx="50" cy="30" r="15" fill="none" stroke-width="5"/>
                <line x1="50" y1="45" x2="50" y2="120" stroke-width="5"/>
                <line x1="50" y1="70" x2="85" y2="60" stroke-width="5" id="b-arm-r"/>
                <line x1="50" y1="70" x2="15" y2="60" stroke-width="5" id="b-arm-l"/>
                <line x1="50" y1="120" x2="30" y2="180" stroke-width="5"/>
                <line x1="50" y1="120" x2="70" y2="180" stroke-width="5"/>
            </svg>

            <svg id="girl" class="neon-char" viewBox="0 0 100 200">
                <circle cx="50" cy="30" r="15" fill="none" stroke-width="5"/>
                <path d="M50 45 L30 120 L70 120 Z" fill="none" stroke-width="5"/>
                <line x1="40" y1="70" x2="10" y2="60" stroke-width="5"/>
                <line x1="60" y1="70" x2="90" y2="60" stroke-width="5"/>
                <line x1="40" y1="120" x2="30" y2="180" stroke-width="5"/>
                <line x1="60" y1="120" x2="70" y2="180" stroke-width="5"/>
            </svg>
        </div>
    </div>

    <div id="tamatar-zone"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bg-music');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function createBlast(x, y) {
            const color = `hsl(${Math.random()*360}, 100%, 50%)`;
            for(let i=0; i<40; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*12, 
                    vy: (Math.random()-0.5)*12, 
                    life: 1, 
                    color
                });
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(render);
        }

        function runStory() {
            document.getElementById('start-screen').style.display = 'none';
            audio.play(); // Song plays here
            render();

            const bInterval = setInterval(() => {
                createBlast(Math.random()*canvas.width, Math.random()*canvas.height);
            }, 700);

            setTimeout(() => {
                document.getElementById('message-screen').style.display = 'block';
            }, 2500);

            setTimeout(() => {
                clearInterval(bInterval);
                document.getElementById('message-screen').style.display = 'none';
                const stage = document.getElementById('dance-stage');
                stage.style.display = 'block';
                
                // Start walking to Hug
                setTimeout(() => stage.classList.add('walk-in'), 500);
                
                // Show final Tomato message after Hug
                setTimeout(() => {
                    showTamatar();
                }, 4500);

            }, 7000);
        }

        function showTamatar() {
            const zone = document.getElementById('tamatar-zone');
            zone.style.display = 'block';
            const msg = document.getElementById('message-screen');
            msg.innerHTML = "<div class='tamatar-text'>ABSE TERE TAMATER MERE 😭<br><span style='font-size:3rem'>TERE TAMATAR CHIYE MUJHE! 🍅😋</span></div>";
            msg.style.display = 'block';

            setInterval(() => {
                const t = document.createElement('div');
                t.className = 'tomato-rain';
                t.innerHTML = '🍅';
                t.style.left = Math.random() * 100 + 'vw';
                zone.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }, 150);
        }
    </script>
</body>
</html>
