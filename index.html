<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Archery Leaderboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #050508; color: white; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #0a0a0f; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .lb-box { width: 80%; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        .lb-row { display: flex; justify-content: space-between; padding: 5px; font-size: 14px; border-bottom: 1px solid #222; }
        .btn { background: #00f2ff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body onload="init()">
    <div id="score" style="position:fixed; top:10px; left:10px; font-size:20px; color:#00f2ff;">SCORE: 0</div>
    <canvas id="c"></canvas>
    <div id="overlay">
        <h1 style="color:#ff007b">GAME OVER</h1>
        <button class="btn" onclick="location.reload()">RESTART</button>
        <div class="lb-box">
            <div style="color:#00f2ff; margin-bottom:10px;">TOP 5 RANKING</div>
            <div id="lb-list">Loading...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const RENDER_URL = "https://jump-to-run.onrender.com";
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let score = 0, active = true, player, pipes = [], frame = 0;

        function init() {
            canvas.width = Math.min(window.innerWidth, 400);
            canvas.height = Math.min(window.innerHeight, 600);
            player = { x: 50, y: canvas.height/2, v: 0 };
            tg.expand();
            loop();
        }

        async function saveAndFetch() {
            const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Tester" };
            
            // 1. Direct API Save (Fallback)
            try {
                await fetch(`${RENDER_URL}/api/save_score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, name: user.first_name, score: score })
                });
            } catch(e) {}

            // 2. Fetch Leaderboard
            try {
                const res = await fetch(`${RENDER_URL}/api/leaderboard`);
                const data = await res.json();
                const list = document.getElementById("lb-list");
                list.innerHTML = data.length ? "" : "No scores yet!";
                data.forEach((u, i) => {
                    list.innerHTML += `<div class="lb-row"><span>${i+1}. ${u.name}</span><span>${u.score}</span></div>`;
                });
            } catch(e) { document.getElementById("lb-list").innerHTML = "Leaderboard Error"; }
        }

        function gameOver() {
            active = false;
            document.getElementById("overlay").style.display = "flex";
            try { tg.sendData(JSON.stringify({score: score})); } catch(e) {}
            saveAndFetch();
        }

        function jump() { if(active) player.v = -4.5; }
        window.addEventListener("mousedown", jump);
        window.addEventListener("touchstart", (e) => { jump(); e.preventDefault(); });

        function loop() {
            if(!active) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            player.v += 0.2; player.y += player.v;
            if(player.y < 0 || player.y > canvas.height) gameOver();
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(player.x, player.y, 25, 25);
            
            if(frame++ % 100 === 0) {
                let h = Math.random() * (canvas.height - 250) + 50;
                pipes.push({ x: canvas.width, y: 0, w: 40, h: h, p: false });
                pipes.push({ x: canvas.width, y: h + 150, w: 40, h: canvas.height });
            }
            pipes.forEach(p => {
                p.x -= 3;
                ctx.fillStyle = "#ff007b"; ctx.fillRect(p.x, p.y, p.w, p.h);
                if(player.x < p.x + p.w && player.x + 25 > p.x && player.y < p.y + p.h && player.y + 25 > p.y) gameOver();
                if(!p.p && p.x + p.w < player.x) { p.p = true; if(pipes.indexOf(p)%2===0) { score++; document.getElementById("score").innerText = "SCORE: " + score; } }
            });
            pipes = pipes.filter(p => p.x > -40);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
