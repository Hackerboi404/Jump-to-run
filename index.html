<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Archery Highscore</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050508;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; touch-action: none;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #16162d 0%, #050508 100%);
        }

        /* SCORE UI */
        #score-board {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00f2ff; font-weight: bold; font-size: 20px;
            text-shadow: 0 0 8px #00f2ff; z-index: 10;
        }

        /* OVERLAY */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; color: white;
        }

        h1 { color: #ff007b; font-size: 42px; margin: 0; text-shadow: 0 0 20px #ff007b; }
        #final-score { font-size: 22px; margin: 10px 0; color: #fff; }

        /* LEADERBOARD */
        #leaderboard {
            width: 85%; max-width: 320px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px; margin: 20px 0;
        }
        .lb-title { text-align: center; color: #00f2ff; font-weight: bold; margin-bottom: 10px; font-size: 14px; letter-spacing: 1px; }
        .lb-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lb-name { color: #ccc; font-size: 15px; }
        .lb-score { color: #00f2ff; font-weight: bold; }

        .btn-restart {
            border: none; padding: 15px 50px;
            color: white; font-size: 18px; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            background: linear-gradient(45deg, #00f2ff, #0062ff);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            transition: transform 0.1s;
        }
        .btn-restart:active { transform: scale(0.9); }
        #sync-status { font-size: 11px; color: #555; margin-top: 15px; }
    </style>
</head>
<body onload="init()">

    <div id="game-container">
        <div id="score-board">SCORE: 0</div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1>BOOM!</h1>
            <div id="final-score">Your Score: 0</div>
            
            <div id="leaderboard">
                <div class="lb-title">TOP 5 CHAMPIONS</div>
                <div id="lb-data">
                    <!-- Leaderboard content -->
                </div>
            </div>

            <button class="btn-restart" onclick="resetGame()">PLAY AGAIN</button>
            <div id="sync-status">Checking server...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://jump-to-run.onrender.com";
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let width, height, player, obstacles, particles, score, active, frame;

        function init() {
            width = Math.min(window.innerWidth, 500);
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            tg.expand();
            
            resetGame();
            animate();
        }

        function resetGame() {
            player = {
                x: 60, y: height / 2,
                w: 25, h: 25,
                velocity: 0,
                trail: []
            };
            obstacles = [];
            particles = [];
            score = 0;
            frame = 0;
            active = true;
            document.getElementById("overlay").style.display = "none";
            document.getElementById("score-board").innerText = `SCORE: 0`;
        }

        async function syncHighscores() {
            const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Archer" };
            const status = document.getElementById("sync-status");
            status.innerText = "Syncing data...";

            try {
                // Save current score
                fetch(`${API_URL}/api/save_score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user.id, name: user.first_name, score: score })
                }).catch(() => {});

                // Get Top 5
                const res = await fetch(`${API_URL}/api/leaderboard`, { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    const data = await res.json();
                    const top5 = data.sort((a, b) => b.score - a.score).slice(0, 5);
                    
                    document.getElementById("lb-data").innerHTML = top5.map((p, i) => `
                        <div class="lb-row">
                            <span class="lb-name">${i+1}. ${p.name}</span>
                            <span class="lb-score">${p.score}</span>
                        </div>
                    `).join('');
                    status.innerText = "Leaderboard Updated";
                }
            } catch (e) {
                status.innerText = "Offline Mode";
                document.getElementById("lb-data").innerHTML = "<div style='text-align:center;padding:10px;color:#444;'>Connecting to server...</div>";
            }
        }

        function gameOver() {
            if(!active) return;
            active = false;
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("final-score").innerText = `Your Score: ${score}`;
            
            // Explosion particles
            for(let i=0; i<20; i++) {
                particles.push(createParticle(player.x, player.y, "#ff007b"));
            }
            
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            syncHighscores();
        }

        function createParticle(x, y, color) {
            return {
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                size: Math.random() * 4 + 1,
                life: 1.0,
                color: color
            };
        }

        const jump = (e) => { 
            if(active) {
                player.velocity = -5.0;
                // Add jump particles
                for(let i=0; i<5; i++) particles.push(createParticle(player.x, player.y + 12, "#00f2ff"));
            }
            if(e && e.cancelable) e.preventDefault();
        };

        window.addEventListener("touchstart", jump, {passive: false});
        window.addEventListener("mousedown", jump);

        function update() {
            if (!active) {
                particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; });
                return;
            }

            frame++;
            player.velocity += 0.24;
            player.y += player.velocity;

            // Trail logic
            player.trail.push({x: player.x, y: player.y});
            if (player.trail.length > 10) player.trail.shift();

            if (player.y + player.h > height || player.y < 0) gameOver();

            // Obstacle spawning
            if (frame % 90 === 0) {
                let gap = 180;
                let h = Math.floor(Math.random() * (height - gap - 200)) + 100;
                obstacles.push({ x: width, y: 0, w: 50, h: h, passed: false });
                obstacles.push({ x: width, y: h + gap, w: 50, h: height });
            }

            obstacles.forEach(obs => {
                obs.x -= 3.5;
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    gameOver();
                }
                if (!obs.passed && obs.x + obs.w < player.x) {
                    obs.passed = true;
                    if (obstacles.indexOf(obs) % 2 === 0) {
                        score++;
                        document.getElementById("score-board").innerText = `SCORE: ${score}`;
                    }
                }
            });

            obstacles = obstacles.filter(o => o.x + o.w > 0);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
            particles = particles.filter(p => p.life > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Neon Trail
            player.trail.forEach((pos, i) => {
                ctx.fillStyle = `rgba(0, 242, 255, ${i / 20})`;
                ctx.fillRect(pos.x, pos.y, player.w, player.h);
            });

            // Player
            ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.fillStyle = "#fff"; ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            
            // Obstacles
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff007b";
            obstacles.forEach(obs => {
                ctx.fillStyle = "#ff007b";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });
            ctx.shadowBlur = 0;
        }

        function animate() {
            update(); draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
